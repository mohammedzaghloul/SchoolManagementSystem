<main class="identity-callback-page">
  <section class="status-card" *ngIf="loading">
    <div class="spinner-border text-primary mb-3" role="status" aria-label="Loading"></div>
    <h1>Finishing account link</h1>
    <p>Checking the authorization response from Central Auth.</p>
  </section>

  <section class="status-card success-card" *ngIf="!loading && result">
    <div class="status-icon">✓</div>
    <h1>تم ربط الحساب بنجاح</h1>
    <p>{{ result.message }}</p>
    <dl>
      <div>
        <dt>School account</dt>
        <dd>{{ result.externalEmail }}</dd>
      </div>
      <div>
        <dt>Central account</dt>
        <dd>{{ result.platformEmail }}</dd>
      </div>
    </dl>
    <a routerLink="/profile" class="btn btn-primary">Back to profile</a>
  </section>

  <section class="status-card error-card" *ngIf="!loading && error">
    <div class="status-icon">!</div>
    <h1>تعذر ربط الحساب</h1>
    <p>{{ error }}</p>
    <a routerLink="/profile" class="btn btn-outline-primary">Try again</a>
  </section>
</main>
