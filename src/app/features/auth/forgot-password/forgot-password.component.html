<div class="auth-container">
    <div class="auth-card">
        <div class="brand">
            <div class="logo-icon">
                <i class="fas fa-school"></i>
            </div>
            <h2>المدرسة الذكية</h2>
        </div>

        <div class="header-text">
            <h3>نسيت كلمة المرور؟</h3>
            <p>أدخل عنوان بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور الخاصة بك.</p>
        </div>

        <form [formGroup]="forgotPasswordForm" (ngSubmit)="onSubmit()">
            <!-- Email Input -->
            <div class="form-group mb-4">
                <label for="email" class="form-label">البريد الإلكتروني</label>
                <div class="input-group-custom">
                    <span class="icon"><i class="far fa-envelope"></i></span>
                    <input type="email" id="email" class="form-control" placeholder="أدخل بريدك الإلكتروني هنا"
                        formControlName="email">
                </div>
                <div *ngIf="forgotPasswordForm.get('email')?.invalid && forgotPasswordForm.get('email')?.touched"
                    class="error-text">
                    <small *ngIf="forgotPasswordForm.get('email')?.errors?.['required']">البريد الإلكتروني
                        مطلوب.</small>
                    <small *ngIf="forgotPasswordForm.get('email')?.errors?.['email']">يرجى إدخال بريد إلكتروني
                        صحيح.</small>
                </div>
            </div>

            <!-- Success Message -->
            <div class="alert alert-success mt-3 auth-alert" *ngIf="isSubmitted && !error">
                <i class="fas fa-check-circle me-2"></i>
                <span>تم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني بنجاح.</span>
            </div>

            <!-- Error Message -->
            <div class="alert alert-danger mt-3 auth-alert" *ngIf="error">
                <i class="fas fa-exclamation-circle me-2"></i>
                <span>{{ error }}</span>
            </div>

            <div class="form-actions mt-4">
                <button type="submit" [disabled]="forgotPasswordForm.invalid || loading"
                    class="btn btn-primary w-100 d-flex justify-content-center align-items-center mb-3">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2" role="status"
                        aria-hidden="true"></span>
                    <span>إرسال رابط إعادة التعيين</span>
                </button>

                <a routerLink="/auth/login" class="back-link">
                    <i class="fas fa-arrow-right"></i>
                    <span>العودة لتسجيل الدخول</span>
                </a>
            </div>
        </form>
    </div>
</div>
