<div class="auth-container">
  <div class="auth-card animate-fade-in">
    <div class="auth-header">
      <div class="logo-circle">
        <i class="fas fa-key"></i>
      </div>
      <h1>تعيين كلمة المرور</h1>
      <p>أدخل الكود المرسل إلى بريدك: <strong>{{ email }}</strong></p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group" [class.success-bg]="otpVerified">
        <label for="otp">كود التحقق (OTP)</label>
        <div class="input-wrapper">
          <i class="fas fa-shield-alt"></i>
          <input
            type="text"
            id="otp"
            formControlName="otp"
            placeholder="000000"
            maxlength="6"
            inputmode="numeric"
            autocomplete="one-time-code"
            [readonly]="otpVerified"
            (input)="onOtpInput()"
          >
          <button
            type="button"
            *ngIf="!otpVerified"
            class="inline-verify-btn"
            (click)="onVerifyOtp()"
            [disabled]="loading || resetForm.get('otp')?.invalid"
          >
            <span *ngIf="!loading">تحقق</span>
            <i *ngIf="loading" class="fas fa-spinner fa-spin"></i>
          </button>
          <i *ngIf="otpVerified" class="fas fa-check-circle success-icon"></i>
        </div>
      </div>

      <div class="password-fields animate-slide-up" *ngIf="otpVerified">
        <div class="form-group">
          <label for="newPassword">كلمة المرور الجديدة</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="newPassword"
              formControlName="newPassword"
              placeholder="8 أحرف على الأقل"
              autocomplete="new-password"
            >
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">تأكيد كلمة المرور</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="confirmPassword"
              formControlName="confirmPassword"
              placeholder="أعد كتابة كلمة المرور"
              autocomplete="new-password"
            >
          </div>
        </div>

        <div *ngIf="resetForm.errors?.['mismatch']" class="error-alert">
          <i class="fas fa-exclamation-circle"></i>
          تأكيد كلمة المرور غير مطابق.
        </div>

        <button type="submit" class="submit-btn" [disabled]="loading || resetForm.invalid">
          <span *ngIf="!loading">تحديث كلمة المرور</span>
          <i *ngIf="loading" class="fas fa-spinner fa-spin"></i>
        </button>
      </div>

      <div *ngIf="error" class="error-alert animate-shake">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
      </div>

      <div class="auth-footer">
        <a routerLink="/auth/forgot-password" class="back-link">
          <i class="fas fa-arrow-right"></i> العودة لطلب كود جديد
        </a>
      </div>
    </form>
  </div>
</div>
