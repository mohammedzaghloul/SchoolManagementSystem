<div class="timetable-container" dir="rtl">
    <!-- Slim Header -->
    <div class="header-content text-center animate-slide-down">
        <h2 class="fw-bold text-dark mb-1">جدولي الدراسي</h2>
        <p class="text-secondary small">عرض سريع للحصص المجدولة</p>
    </div>

    <!-- Error/Loading -->
    <div class="alert alert-danger py-2 px-3 small" *ngIf="error">{{ error }}</div>
    
    <div *ngIf="loading" class="text-center py-4">
        <div class="spinner-sm spinner-border text-primary" role="status"></div>
    </div>

    <!-- Compact Grid -->
    <div class="timetable-grid-card overflow-hidden animate-fade-in" *ngIf="!loading && !error">
        <div class="table-responsive">
            <table class="table table-borderless timetable-modern-table mb-0">
                <thead>
                    <tr>
                        <th class="time-header-cell">اليوم</th>
                        <th class="py-3 time-slot-header text-center" *ngFor="let time of timeSlots">
                            <span class="text-primary fw-bold">{{ time }}</span>
                        </th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let day of daysOfWeek">
                        <td class="day-header-cell border-end">
                            <div class="day-name fw-bold">{{ day }}</div>
                        </td>
                        <td *ngFor="let time of timeSlots" class="slot-cell">
                            <div *ngIf="timetableMatrix[day]?.[time]; else emptySlot" 
                                class="session-premium-card animate-pop-in"
                                [class]="getSubjectColor(timetableMatrix[day][time]!.subjectName)">
                                <div class="card-content h-100 d-flex flex-column justify-content-between">
                                    <div class="subject-title text-truncate">{{ timetableMatrix[day][time]!.subjectName }}</div>
                                    
                                    <div class="meta-section">
                                        <div class="badge-glass mb-1 w-100 justify-content-center">
                                            <i class="fas fa-school me-1"></i> {{ timetableMatrix[day][time]!.classRoomName }}
                                        </div>
                                        <button class="btn btn-action-glass w-100 py-1" 
                                                [routerLink]="['/teacher/attendance/manual']" 
                                                [queryParams]="{sessionId: timetableMatrix[day][time]!.id}">
                                            رصد
                                        </button>
                                    </div>
                                </div>
                            </div>
                            <ng-template #emptySlot>
                                <div class="empty-placeholder">
                                    <div class="dot"></div>
                                </div>
                            </ng-template>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
