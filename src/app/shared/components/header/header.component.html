<header class="top-header">
    <div class="header-right">
        <div class="user-profile" *ngIf="currentUser" routerLink="/profile" title="الملف الشخصي">
            <div class="avatar-circle">
                <img [src]="currentUser.avatar || '/assets/images/default-avatar.png'" alt="User Avatar"
                    *ngIf="currentUser.avatar; else iconAvatar">
                <ng-template #iconAvatar>
                    <i class="fas fa-user-circle"></i>
                </ng-template>
            </div>
            <div class="user-info">
                <h4>{{ currentUser.fullName }}</h4>
                <p>{{ getRoleText(currentUser.role) }}</p>
            </div>
        </div>
    </div>

    <div class="header-center">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="ابحث عن صفحة أو ميزة..." (input)="onSearchChange($event)">
        </div>
    </div>

    <div class="header-left">
        <button class="icon-btn theme-toggle" (click)="toggleTheme()" [attr.aria-label]="isDarkMode ? 'الوضع الفاتح' : 'الوضع الداكن'">
            <i class="far fa-moon" *ngIf="!isDarkMode"></i>
            <i class="fas fa-sun text-warning" *ngIf="isDarkMode"></i>
        </button>

        <div class="notification-box" [class.open]="showNotifications" (click)="toggleNotifications($event)">
            <button class="icon-btn notification-trigger" [class.has-unread]="unreadCount > 0" aria-label="الإشعارات">
                <i class="far fa-bell"></i>
            </button>
            <span class="badge" *ngIf="unreadCount > 0">{{ unreadCount }}</span>

            <div class="dropdown-menu notifications-menu shadow-lg border-0" *ngIf="showNotifications"
                (click)="$event.stopPropagation()">
                <div class="dropdown-header d-flex justify-content-between align-items-center">
                    <div>
                        <span>الإشعارات</span>
                        <small class="d-block text-muted mt-1" *ngIf="notifications.length > 0">آخر التحديثات داخل الموقع</small>
                    </div>
                    <button class="btn btn-link btn-sm p-0 text-primary text-decoration-none"
                        *ngIf="notifications.length > 0" (click)="clearNotifications($event)">مسح الكل</button>
                </div>

                <div class="dropdown-content">
                    <div *ngIf="notifications.length === 0" class="notification-item text-center p-4 text-muted">
                        <i class="fas fa-bell-slash mb-2 d-block opacity-25" style="font-size: 2rem;"></i>
                        <p class="mb-1 small">لا توجد إشعارات جديدة الآن</p>
                        <small>أي رسالة أو تنبيه جديد سيظهر هنا تلقائيًا.</small>
                    </div>

                    <div *ngFor="let notif of notifications" class="notification-item p-3 border-bottom"
                        [style.cursor]="notif.type === 'message' ? 'pointer' : 'default'"
                        (click)="notif.type === 'message' && goToChat()">
                        <div class="d-flex gap-3">
                            <div class="notif-icon-circle rounded-circle d-flex align-items-center justify-content-center flex-shrink-0"
                                [style.background]="notif.type === 'message' ? '#dcfce7' : '#e0f2fe'"
                                [style.color]="notif.type === 'message' ? '#15803d' : '#0369a1'"
                                style="width: 38px; height: 38px;">
                                <i class="fas" [class.fa-envelope]="notif.type === 'message'"
                                    [class.fa-bell]="notif.type !== 'message'"></i>
                            </div>
                            <div class="flex-grow-1 overflow-hidden">
                                <h6 class="mb-1 fw-bold small text-dark-emphasis">{{ notif.title }}</h6>
                                <p class="mb-1 text-muted small">{{ notif.message }}</p>
                                <div class="notification-meta">
                                    <small class="text-muted-dark opacity-75">{{ notif.createdAt | date:'short' }}</small>
                                    <button *ngIf="notif.type === 'message'" class="btn btn-link btn-sm p-0 text-decoration-none"
                                        (click)="goToChat(); $event.stopPropagation();">فتح التواصل</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>
