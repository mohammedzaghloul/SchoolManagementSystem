<nav class="bottom-nav" *ngIf="isAuthenticated">
    <div class="nav-items">
        <a [routerLink]="dashboardRoute" routerLinkActive="active" class="nav-item">
            <div class="nav-icon-wrapper">
                <i class="fas fa-th-large"></i>
            </div>
            <span>الرئيسية</span>
        </a>

        <a [routerLink]="attendanceRoute" routerLinkActive="active" class="nav-item" *ngIf="attendanceRoute">
            <div class="nav-icon-wrapper">
                <i class="fas" [ngClass]="userRole === 'Admin' ? 'fa-calendar-days' : 'fa-user-check'"></i>
            </div>
            <span>{{ attendanceLabel }}</span>
        </a>

        <a [routerLink]="classesRoute" routerLinkActive="active" class="nav-item" *ngIf="classesRoute">
            <div class="nav-icon-wrapper">
                <i class="fas" [ngClass]="classesIcon"></i>
            </div>
            <span>{{ classesLabel }}</span>
        </a>

        <a [routerLink]="paymentsRoute" routerLinkActive="active" class="nav-item" *ngIf="paymentsRoute">
            <div class="nav-icon-wrapper">
                <i class="fas fa-file-invoice-dollar"></i>
            </div>
            <span>المصروفات</span>
        </a>

        <a routerLink="/chat" routerLinkActive="active" class="nav-item" (click)="onChatClick()">
            <div class="nav-icon-wrapper">
                <i class="fas fa-comment-dots"></i>
                <span class="nav-badge" *ngIf="unreadChatCount > 0">{{ unreadChatCount }}</span>
            </div>
            <span>التواصل</span>
        </a>

        <button class="nav-item menu-btn border-0 bg-transparent" (click)="toggleMenu()">
            <div class="nav-icon-wrapper">
                <i class="fas fa-bars"></i>
            </div>
            <span>القائمة</span>
        </button>
    </div>

    <div class="mobile-menu-overlay" *ngIf="showMenu" (click)="toggleMenu()"></div>
    <div class="mobile-bottom-sheet" [class.open]="showMenu">
        <div class="sheet-header">
            <div class="drag-handle"></div>
            <h5>القائمة الإضافية</h5>
            <button class="close-btn" (click)="toggleMenu()"><i class="fas fa-times"></i></button>
        </div>
        <div class="sheet-content">
            <ng-container *ngIf="userRole === 'Admin'">
                <a routerLink="/admin/students" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-user-graduate"></i>
                    <span>الطلاب</span>
                </a>
                <a routerLink="/admin/teachers" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-chalkboard-teacher"></i>
                    <span>المدرسين</span>
                </a>
                <a routerLink="/admin/sessions" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-calendar-days"></i>
                    <span>جدول الحصص</span>
                </a>
                <a routerLink="/admin/reports" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-chart-pie"></i>
                    <span>التقارير</span>
                </a>
            </ng-container>

            <ng-container *ngIf="userRole === 'Teacher'">
                <a routerLink="/teacher/grades" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-pen"></i>
                    <span>درجات الطلاب</span>
                </a>
                <a routerLink="/teacher/assignments" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-tasks"></i>
                    <span>الواجبات</span>
                </a>
                <a routerLink="/teacher/exams" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-file-alt"></i>
                    <span>الامتحانات</span>
                </a>
                <a routerLink="/teacher/videos" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-video"></i>
                    <span>الفيديوهات</span>
                </a>
            </ng-container>

            <ng-container *ngIf="userRole === 'Student'">
                <a routerLink="/student/exams" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-file-alt"></i>
                    <span>الامتحانات</span>
                </a>
                <a routerLink="/student/grades" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-chart-line"></i>
                    <span>الدرجات</span>
                </a>
                <a routerLink="/student/videos" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-video"></i>
                    <span>الفيديوهات</span>
                </a>
            </ng-container>

            <ng-container *ngIf="userRole === 'Parent'">
                <a routerLink="/parent/dashboard" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-children"></i>
                    <span>متابعة الأبناء</span>
                </a>
                <a routerLink="/parent/payments" class="sheet-item" (click)="toggleMenu()">
                    <i class="fas fa-file-invoice-dollar"></i>
                    <span>المصروفات والفواتير</span>
                </a>
                <a routerLink="/chat" class="sheet-item" (click)="onChatClick(); toggleMenu()">
                    <i class="fas fa-comments"></i>
                    <span>التواصل مع المدرسة</span>
                </a>
            </ng-container>

            <a routerLink="/profile" class="sheet-item" (click)="toggleMenu()">
                <i class="fas fa-user-circle"></i>
                <span>الملف الشخصي</span>
            </a>
            <div class="sheet-divider"></div>
            <button class="sheet-item text-danger" (click)="logout()">
                <i class="fas fa-sign-out-alt"></i>
                <span>تسجيل الخروج</span>
            </button>
        </div>
    </div>
</nav>
